name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Publish packages (skip already-published versions)
        run: |
          publish_if_new() {
            local dir=$1
            local name version
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if npm view "${name}@${version}" version &>/dev/null; then
              echo "⏭  ${name}@${version} already published, skipping"
            else
              echo "📦 Publishing ${name}@${version}..."
              pnpm publish --no-git-checks --access public
            fi
          }
          cd packages/native-scheduler-types  && publish_if_new && cd ../..
          cd packages/native-scheduler-plugin && publish_if_new && cd ../..
          cd packages/sentinel-plugin          && publish_if_new && cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
