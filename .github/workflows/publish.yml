name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Publish @spectratools/native-scheduler-types
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/native-scheduler-types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spectratools/native-scheduler-plugin
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/native-scheduler-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spectratools/sentinel-plugin
        run: pnpm publish --no-git-checks --access public
        working-directory: packages/sentinel-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
